<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Risco de Crédito</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #020617);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 400px;
      text-align: center;
    }

    h1 {
      margin-bottom: 20px;
      font-size: 26px;
    }

    .search-box {
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #1e293b;
      color: white;
    }

    input:focus {
      outline: 2px solid #22c55e;
    }

    button {
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      background: #22c55e;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    .card {
      margin-top: 25px;
      padding: 20px;
      border-radius: 16px;
      text-align: left;
      background: #1e293b;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      transition: 0.3s;
    }

    .empresa {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .linha {
      margin: 6px 0;
      font-size: 14px;
    }

    .rating {
      margin-top: 15px;
      padding: 10px;
      border-radius: 10px;
      text-align: center;
      font-weight: bold;
    }

    .loading {
      margin-top: 20px;
      opacity: 0.7;
    }

  </style>
</head>
<body>

<div class="container">
  <h1>📊 Credit Risk</h1>

  <div class="search-box">
    <input id="empresa" placeholder="Digite empresa (ex: Amazon)">
    <button onclick="buscar()">Buscar</button>
  </div>

  <div id="resultado"></div>
</div>

<script>
async function buscar() {
  const empresa = document.getElementById("empresa").value;
  const div = document.getElementById("resultado");

  if (!empresa) {
    div.innerHTML = "<p>⚠️ Digite uma empresa</p>";
    return;
  }

  div.innerHTML = '<div class="loading">🔄 Buscando...</div>';

  try {
    const res = await fetch(`/api?empresa=${empresa}`);
    const data = await res.json();

    if (data.erro) {
      div.innerHTML = `<p>${data.erro}</p>`;
      return;
    }

    // 🎯 cores por risco
    let corBg = "#1e293b";
    let corRating = "#22c55e";

    if (data.Rating.includes("🔴")) {
      corBg = "#7f1d1d";
      corRating = "#ef4444";
    } else if (data.Rating.includes("🟡")) {
      corBg = "#78350f";
      corRating = "#eab308";
    }

    div.innerHTML = `
      <div class="card" style="background:${corBg}">
        <div class="empresa">${data.Empresa}</div>

        <div class="linha">💰 Dívida: ${data.Divida_2024}</div>
        <div class="linha">📈 EBITDA: ${data.EBITDA_2024}</div>
        <div class="linha">⚖️ Alavancagem: ${data.Alavancagem}</div>

        <div class="rating" style="background:${corRating}">
          ${data.Rating}
        </div>
      </div>
    `;
  } catch (err) {
    div.innerHTML = "<p>❌ Erro ao conectar com a API</p>";
  }
}

// Enter para buscar
document.getElementById("empresa").addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    buscar();
  }
});
</script>

</body>
</html>
