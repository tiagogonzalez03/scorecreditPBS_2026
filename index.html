<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Credit Risk</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', Arial;
  background: linear-gradient(135deg, #0f172a, #020617);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  width: 400px;
}

.search-box {
  position: relative;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #1e293b;
  color: white;
}

button {
  margin-top: 10px;
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #22c55e;
  color: white;
  cursor: pointer;
}

.suggestions {
  position: absolute;
  width: 100%;
  background: #1e293b;
  border-radius: 10px;
  margin-top: 5px;
  max-height: 200px;
  overflow-y: auto;
  z-index: 10;
}

.suggestion-item {
  padding: 10px;
  cursor: pointer;
}

.suggestion-item:hover {
  background: #334155;
}

.card {
  margin-top: 20px;
  padding: 20px;
  border-radius: 16px;
}
</style>
</head>

<body>

<div class="container">

<h2>📊 Credit Risk</h2>

<div class="search-box">
  <input id="empresa" placeholder="Digite empresa..." oninput="autocomplete()">
  <div id="suggestions" class="suggestions"></div>
</div>

<button onclick="buscar()">Buscar</button>

<div id="resultado"></div>

</div>

<script>

async function autocomplete() {
  const query = document.getElementById("empresa").value;
  const box = document.getElementById("suggestions");

  if (query.length < 2) {
    box.innerHTML = "";
    return;
  }

  const res = await fetch(`/api?empresa=${query}`);
  const data = await res.json();

  box.innerHTML = "";

  data.forEach(item => {
    const div = document.createElement("div");
    div.className = "suggestion-item";
    div.innerText = item.Empresa;

    div.onclick = () => {
      document.getElementById("empresa").value = item.Empresa;
      box.innerHTML = "";
    };

    box.appendChild(div);
  });
}

async function buscar() {
  const empresa = document.getElementById("empresa").value;
  const div = document.getElementById("resultado");

  div.innerHTML = "🔄 Buscando...";

  const res = await fetch(`/api?empresa=${empresa}`);
  const data = await res.json();

  const item = data[0]; // pega o primeiro

  if (!item) {
    div.innerHTML = "Empresa não encontrada";
    return;
  }

  let corBg = "#1e293b";
  let corRating = "#22c55e";

  if (item.Rating.includes("🔴")) {
    corBg = "#7f1d1d";
    corRating = "#ef4444";
  } else if (item.Rating.includes("🟡")) {
    corBg = "#78350f";
    corRating = "#eab308";
  }

  div.innerHTML = `
    <div class="card" style="background:${corBg}">
      <h3>${item.Empresa}</h3>
      <p>Dívida: ${item.Divida_2024}</p>
      <p>EBITDA: ${item.EBITDA_2024}</p>
      <p>Alavancagem: ${item.Alavancagem}</p>
      <p style="color:${corRating}; font-weight:bold;">
        ${item.Rating}
      </p>
    </div>
  `;
}

</script>

</body>
</html>
